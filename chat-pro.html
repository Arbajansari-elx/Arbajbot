
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arbaj AI Pro — Chat & Live Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0c;
            --card: #14141d;
            --accent: #ff5e00; /* Neon Orange */
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.08);
            --code-bg: #0d1117;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Grid Background */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 30px 30px; z-index: -1; opacity: 0.2;
        }

        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 12, 0.9); backdrop-filter: blur(10px); z-index: 100; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 600; font-size: 18px; }
        .logo-box { background: var(--accent); color: white; width: 32px; height: 32px; display: grid; place-items: center; border-radius: 8px; font-weight: bold; box-shadow: 0 0 15px rgba(255, 94, 0, 0.3); }
        .online { font-size: 12px; color: #4ade80; display: flex; align-items: center; gap: 6px; }
        .online-blink { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        /* Chat Area */
        #chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
        .msg { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.6; animation: slideUp 0.3s ease forwards; opacity: 0; transform: translateY(10px); }
        .user-msg { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 4px; width: 90%; }
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* CODE BLOCK STRUCTURE */
        .code-block { margin: 20px 0; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; background: var(--code-bg); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        /* Shared Header & Footer styling */
        .code-bar { background: rgba(255,255,255,0.03); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .code-header { border-bottom: 1px solid var(--border); }
        .code-footer { border-top: 1px solid var(--border); }

        .lang-tag { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--accent); text-transform: uppercase; font-weight: 600; }
        .code-btns { display: flex; gap: 10px; }
        
        .btn-action { padding: 6px 12px; border-radius: 8px; border: none; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: 'Outfit'; display: flex; align-items: center; gap: 6px; }
        .btn-copy { background: rgba(255,255,255,0.08); color: white; }
        .btn-preview { background: var(--accent); color: white; }
        .btn-action:hover { transform: translateY(-1px); opacity: 0.9; }

        pre { padding: 15px; overflow-x: auto; font-family: 'JetBrains Mono'; font-size: 13px; color: #a5d6ff; background: var(--code-bg); }

        /* Input Area */
        .input-wrap { padding: 20px; background: linear-gradient(transparent, var(--bg) 30%); }
        .input-box { max-width: 900px; margin: 0 auto; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 10px 15px; display: flex; align-items: flex-end; gap: 12px; transition: 0.3s; }
        .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(255, 94, 0, 0.1); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px 5px; font-family: inherit; font-size: 15px; max-height: 150px; resize: none; }
        textarea:disabled { opacity: 0.6; cursor: not-allowed; }

        #send-btn { background: var(--accent); border: none; width: 44px; height: 44px; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; flex-shrink: 0; }
        #send-btn:hover:not(:disabled) { transform: scale(1.05) rotate(-5deg); box-shadow: 0 0 20px var(--accent); }
        #send-btn:disabled { opacity: 0.5; filter: grayscale(1); }

        /* MODAL PREVIEW */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; display: none; flex-direction: column; }
        .modal-nav { padding: 15px 25px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); background: var(--bg); }
        .tab { background: transparent; border: none; color: var(--text-dim); padding: 10px 20px; cursor: pointer; font-weight: 600; font-size: 14px; position: relative; }
        .tab.active { color: var(--accent); }
        .tab.active::after { content: ''; position: absolute; bottom: -16px; left: 0; width: 100%; height: 2px; background: var(--accent); }
        .close-modal { margin-left: auto; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white; width: 36px; height: 36px; border-radius: 10px; cursor: pointer; }

        .modal-view { flex: 1; position: relative; }
        #preview-frame { width: 100%; height: 100%; border: none; background: white; display: none; }
        #code-display { width: 100%; height: 100%; overflow: auto; background: #0d1117; display: none; padding: 25px; }
        .active-view { display: block !important; }

        /* Skeleton Thinking */
        .typing-dots { display: flex; gap: 5px; padding: 10px; align-items: center; }
        .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-box">A</div>
        Arbaj AI Pro
    </div>
    <div class="online">
        <span class="online-blink"></span>
        Online
    </div>
</header>

<div id="chat-area">
    <div class="msg ai-msg">
        NAMSTE ENGNIEER Main <b>Arbaj AI Pro</b> hoon. <br>Koi bhi code likhne ko bolo, main live preview ke saath taiyar hoon.
    </div>
</div>

<div class="input-wrap">
    <div class="input-box">
        <textarea id="prompt" rows="1" placeholder="Write something... (e.g. Portfolio with animations)"></textarea>
        <button id="send-btn" onclick="handleSend()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<!-- Modal -->
<div id="modal">
    <div class="modal-nav">
        <button class="tab active" id="btn-preview" onclick="switchView('preview')">Live Preview</button>
        <button class="tab" id="btn-code" onclick="switchView('code')">Source Code</button>
        <button class="close-modal" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-view">
        <iframe id="preview-frame"></iframe>
        <div id="code-display"><pre id="modal-code-content"></pre></div>
    </div>
</div>

<script>
    const apiKey = ""; // Handled by environment
    const chatArea = document.getElementById('chat-area');
    const promptInput = document.getElementById('prompt');
    const sendBtn = document.getElementById('send-btn');

    // Auto-resize textarea
    promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
    });

    async function handleSend() {
        const text = promptInput.value.trim();
        if(!text) return;

        // User UI
        renderMessage('user', text);
        
        // Disable state & Placeholder change
        promptInput.value = "";
        promptInput.style.height = 'auto';
        promptInput.placeholder = "Generating Code...";
        promptInput.disabled = true;
        sendBtn.disabled = true;

        // AI Thinking bubble
        const thinkingId = addThinkingBubble();

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: text }] }],
                    systemInstruction: { parts: [{ text: "You are Arbaj AI Pro. Always provide high-quality code in markdown backticks. For web code, use a single block if possible. Focus on modern UI/UX." }] }
                })
            });

            const data = await response.json();
            const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || "Maaf kijiyega, main samajh nahi paya.";
            
            document.getElementById(thinkingId).remove();
            renderAIResponse(aiResponse);

        } catch (err) {
            document.getElementById(thinkingId).innerText = "Error connecting to AI. Try again.";
        } finally {
            // Restore state
            promptInput.placeholder = "Describe your UI/Code...";
            promptInput.disabled = false;
            sendBtn.disabled = false;
            promptInput.focus();
        }
    }

    function renderMessage(role, content) {
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;
        div.innerText = content;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function addThinkingBubble() {
        const id = 'think-' + Date.now();
        const div = document.createElement('div');
        div.id = id;
        div.className = 'msg ai-msg';
        div.innerHTML = `<div class="typing-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return id;
    }

    function renderAIResponse(text) {
        const bubble = document.createElement('div');
        bubble.className = 'msg ai-msg';
        
        const parts = text.split(/```/);
        let html = "";

        parts.forEach((part, index) => {
            if (index % 2 === 1) { // Code block
                const lines = part.split('\n');
                const lang = lines[0].trim() || "code";
                const code = lines.slice(1).join('\n').trim();
                const encoded = encodeURIComponent(code);
                const isWeb = ['html', 'css', 'js', 'javascript', 'svg'].includes(lang.toLowerCase());

                const buttonSet = `
                    <div class="code-btns">
                        <button class="btn-action btn-copy" onclick="copyCode(this, \`${encoded}\`)">Copy</button>
                        <button class="btn-action btn-preview" onclick="openModal(\`${encoded}\`, '${lang}')">
                            ${isWeb ? '▶ Preview' : '📋 View'}
                        </button>
                    </div>
                `;

                html += `
                    <div class="code-block">
                        <div class="code-bar code-header">
                            <span class="lang-tag">${lang}</span>
                            ${buttonSet}
                        </div>
                        <pre>${code.replace(/</g, '&lt;')}</pre>
                        <div class="code-bar code-footer">
                            <span class="lang-tag">${lang} End</span>
                            ${buttonSet}
                        </div>
                    </div>
                `;
            } else {
                html += `<span>${part.replace(/\n/g, '<br>')}</span>`;
            }
        });

        bubble.innerHTML = html;
        chatArea.appendChild(bubble);
        chatArea.scrollTop = chatArea.scrollHeight;
    }

    function openModal(encoded, lang) {
        const code = decodeURIComponent(encoded);
        const modal = document.getElementById('modal');
        const frame = document.getElementById('preview-frame');
        const codeView = document.getElementById('code-display');
        const isWeb = ['html', 'css', 'js', 'javascript', 'svg'].includes(lang.toLowerCase());

        document.getElementById('modal-code-content').innerText = code;
        modal.style.display = 'flex';

        if(isWeb) {
            frame.srcdoc = code;
            switchView('preview');
            document.getElementById('btn-preview').style.display = 'block';
        } else {
            switchView('code');
            document.getElementById('btn-preview').style.display = 'none';
        }
    }

    function switchView(view) {
        const frame = document.getElementById('preview-frame');
        const code = document.getElementById('code-display');
        const tPreview = document.getElementById('btn-preview');
        const tCode = document.getElementById('btn-code');

        if(view === 'preview') {
            frame.classList.add('active-view');
            code.classList.remove('active-view');
            tPreview.classList.add('active');
            tCode.classList.remove('active');
        } else {
            code.classList.add('active-view');
            frame.classList.remove('active-view');
            tCode.classList.add('active');
            tPreview.classList.remove('active');
        }
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('preview-frame').srcdoc = "";
    }

    function copyCode(btn, encoded) {
        const code = decodeURIComponent(encoded);
        navigator.clipboard.writeText(code);
        const original = btn.innerText;
        btn.innerText = "✓ Copied";
        setTimeout(() => btn.innerText = original, 2000);
    }
</script>
</body>
</html>
